name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Ensure gradle properties are set
        run: |
          cat >> android/gradle.properties << 'EOF'

          hermesEnabled=true
          newArchEnabled=false
          reactNativeArchitectures=arm64-v8a,armeabi-v7a,x86_64
          EOF

      - name: Remove codegen-generated ViewManager interfaces (Old Arch fix)
        run: |
          # Remove any codegen-generated files that reference NewArch-only classes
          find android -path "*/com/facebook/react/viewmanagers/*" -name "*.java" -delete 2>/dev/null || true
          echo "Cleaned codegen viewmanager interfaces"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK_PATH"
          ls -lh $APK_PATH

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SailRaceManager-Android-${{ github.sha }}
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
